[tox]
requires =
    tox>=4.51.0
    tox-uv
env_list =
    pre-commit,
    docs-{build,doctests},
    typing-{mypy,pyright,ty,pyrefly},
    3.{10-14}-mypy
    3.{10-14}-tests{,-optional},
    3.15-tests,
    coverage-{combine,report}


[pkgenv]
pass_env = SETUPTOOLS_SCM_PRETEND_VERSION


[testenv]
runner = uv-venv-lock-runner
package = wheel
wheel_build_env = .pkg
dependency_groups =
    mypy: mypy
    tests: cov
    optional: optional
    docs: docs
commands =
    tests: coverage run -m pytest {posargs}
    mypy: mypy --cache-dir={env_tmp_dir}/mypy_cache --enable-incomplete-feature=TypeForm tests/typing/core.py tests/typing/flask.py tests/typing/aiohttp.py tests/typing/pyramid.py tests/typing/starlette.py docs/examples/starlette/simple_starlette_app.py


# Split combine/report in 2 to avoid excessive "Combined data file ..." output.
[testenv:coverage-combine]
base_python_file = .python-version-default
depends = *-tests*
skip_install = true
dependency_groups = cov
commands = coverage combine

[testenv:coverage-report]
base_python_file = .python-version-default
depends = coverage-combine
parallel_show_output = true
skip_install = true
dependency_groups = cov
commands = coverage report


[testenv:pre-commit]
runner = uv-venv-runner
description = Run all pre-commit hooks.
skip_install = true
deps = prek
commands = prek run --all-files


[testenv:typing-{pyright,ty,mypy,pyrefly}]
description = Type-check the package.
base_python_file = .python-version-default
dependency_groups =
    mypy: mypy
    pyright: pyright
    ty: ty
    pyrefly: pyrefly
commands =
    # Mypy API checks need to happen per-Python version.
    # For some reason, this env poisons the cache, so we use a separate one.
    mypy: mypy --cache-dir={env_tmp_dir}/mypy_cache --enable-incomplete-feature=TypeForm src
    pyrefly: pyrefly check --remove-unused-ignores
    pyright: pyright tests/typing src
    ty: ty check


[testenv:docs-{build,doctests,linkcheck}]
# Keep base_python in sync with ci.yml/docs and .readthedocs.yaml.
base_python = 3.14
dependency_groups = docs
commands =
    build: sphinx-build -n -T -W -b html -d {envtmpdir}/doctrees docs {posargs:docs/_build/}html
    # Sybil
    doctests: pytest docs
    linkcheck: sphinx-build -W -b linkcheck -d {envtmpdir}/doctrees docs docs/_build/html

[testenv:docs-watch]
package = editable
base_python = {[testenv:docs-build]base_python}
dependency_groups = docs-watch
commands =
    watchfiles \
        --ignore-paths docs/_build/ \
        'sphinx-build -W -n -b html -d {envtmpdir}/doctrees docs docs/_build/html' \
        src \
        docs \
        README.md \
        CHANGELOG.md

[testenv:docs-linkcheck]
base_python = {[testenv:docs-build]base_python}
dependency_groups = {[testenv:docs-build]dependency_groups}
commands = sphinx-build -W -b linkcheck -d {envtmpdir}/doctrees docs docs/_build/html
